allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"

subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}

subprojects {
    project.evaluationDependsOn(":app")
}

subprojects {
    configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == "com.yandex.android" &&
                details.requested.name == "maps.mobile" &&
                (details.requested.version == null || details.requested.version.isEmpty())) {
                details.useVersion("4.33.1-lite")
            }
        }
    }
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
